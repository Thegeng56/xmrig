<title>patient registration form</title>
</head>
<body>
  <h2>Patient Registration form</h2>  
  <p>please fill in all required fields before submitting the form</p>
  <form>
    <label>Full name</label><br>
    <input type="text"name="fullname"required><br>
    <label>Email address</label><br>
    <input type="email" name="email"required><br>
    <label>phone number</label><br>
    <input type="tel"name="phone"required><br>
    <label>Date of birth</label><br>
    <input type="date"name="dob"><br>
    <label>Gender</label><br>
    <input type="radio"name="Gender"value="male">male
    <input type="radio"name="Gender"value="female">female
    <input type="radio"name="Gender"value="other">other
    <br><br>
    <label>Services required</label><br>
    <input type="checkbox"name="service"value="consultation">consultation<br>
    <input type="checkbox" name="service"value="laboratory test">laboratory text<br>
    <input type="checkbox"name="service"value="pharmacy">pharmacy</label><br><br>
    <label>County of residence</label><br>
    <select name="county">
        <option>Nairobi</option>
        <option>Kiambu</option>
        <option>Nakuru</option>
        <option>Mombasa</option>
        </select>
        <br><br>
        <label>Additional Comments</label><br>
        <textarea rows="4"cols="40"></textarea><br><br>
        <input type="submit"value="submit">
        <input type="reset"value="Reset">
  </form>
</body>
